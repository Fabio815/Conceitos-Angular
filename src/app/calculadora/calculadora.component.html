<div class="container">
    <div class="form-box">
        <form #frm="ngForm" (ngSubmit)="somaNumeros()">
            <h2>Calculadora</h2>

            <label for="numero1">Número 1</label>
            <input type="number" name="numero1" id="numero1" [(ngModel)]="numero1">

            <label for="numero2">Número 2</label>
            <input type="number" name="numero2" id="numero2" [(ngModel)]="numero2">

            <button type="submit">Calcular</button>
            <!--
                @if (resultado) {
                    <div class="resultado">
                        <p>Resultado: <span id="resultado">{{ resultado }}</span></p>
                    </div>
                } @else {
                    <p>batata</p>
                }
            -->

            <div class="resultado" *ngIf="resultado">
                <p>Resultado: <span id="resultado">{{ resultado }}</span></p>
            </div>
        </form>
    </div>
</div>
