<div class="container-pai">
    <div class="container">
        <h1>Tabela de compras</h1>
        <form class="adicionar-item-formulario" #frm="ngForm" (ngSubmit)="adicionarItem()">
            <input type="text" id="botao-adicionar" placeholder="Adicione um item" name="item" [(ngModel)]="item">
            <button type="submit">Adicionar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                @for (elemento of itens; track elemento.id) {
                    <tr>
                        <td>{{ elemento.id }}</td>
                        <td><span [ngClass]="{ 'item-riscado': elemento.comprado}">{{ elemento.nome }}</span></td>
                        <td><input type="checkbox" [checked]="elemento.comprado" (click)="riscarItem(elemento)"/></td>
                    </tr>
                } @empty {
                    <tr id="lista-vazia" colapse="3">
                        Lista vazia
                    </tr>
                }

                <!--
                <tr *ngFor="let elemento of itens">
                    <td>{{ elemento.id }}</td>
                    <td>{{ elemento.nome }}</td>
                    <td><input type="checkbox" /></td>
                </tr>
                -->
            </tbody>
        </table>
    </div>
</div>
